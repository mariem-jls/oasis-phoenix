<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Culture Phoenix — Dashboard Carbone</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;600;800&family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --green:#00ff88; --yellow:#ffcc00; --red:#ff3355;
      --blue:#00cfff;  --bg:#121c26;    --panel:#1d2a38;
      --border:rgba(0,255,136,0.3);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:var(--bg); color:#ffffff;
      font-family:'Exo 2',sans-serif; min-height:100vh;
    }

    /* HEADER */
    #header {
      position: sticky; top:0; z-index:100;
      display: flex; align-items:center; justify-content:space-between;
      padding: 10px 28px;
      background: rgba(5,13,18,0.97);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(8px);
    }
    .logo-wrap { display:flex; align-items:center; gap:14px; text-decoration:none; }
    .logo-svg { width:38px; height:38px; }
    .logo-text { font-family:'Cinzel',serif; font-size:.9rem; font-weight:700; letter-spacing:.2em; color:var(--green); text-shadow:0 0 20px rgba(0,255,136,0.5); }
    .logo-sub-text { font-family:'Share Tech Mono',monospace; font-size:.5rem; letter-spacing:.3em; color:rgba(0,255,136,0.4); display:block; margin-top:2px; }

    .pulse-dot { width:8px; height:8px; border-radius:50%; background:var(--green); display:inline-block; margin-right:8px; animation:pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(0,255,136,0.7)} 50%{box-shadow:0 0 0 6px rgba(0,255,136,0)} }

    .nav-links { display:flex; gap:8px; align-items: center; }
    .nav-btn {
      font-family:'Share Tech Mono',monospace; font-size:.62rem; letter-spacing:.15em;
      padding:7px 16px; border-radius:999px; cursor:pointer; text-decoration:none;
      border:1px solid var(--border); background:rgba(0,255,136,0.06); color:#d2ffe6;
      transition:all .25s;
    }
    .nav-btn:hover { background:rgba(0,255,136,0.15); border-color:rgba(0,255,136,0.4); }
    .nav-btn.active { border-color: var(--green); background: rgba(0,255,136,0.1); }


    #content { padding:24px; max-width:1200px; margin:0 auto; }

    /* PRICE BANNER */
    .price-banner {
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 20px; margin-bottom:20px;
      border:1px solid rgba(0,255,136,0.3);
      background:rgba(0,255,136,0.05); border-radius:8px;
      flex-wrap:wrap; gap:10px;
    }
    .pb-left { display:flex; align-items:center; gap:16px; }
    .pb-title { font-size:0.75rem; letter-spacing:3px; text-transform:uppercase; color:var(--green); font-weight:700; }
    .pb-price { font-family:'Share Tech Mono',monospace; font-size:1.8rem; color:var(--green); text-shadow: 0 0 15px rgba(0,255,136,0.3); }
    .pb-sub   { font-size:0.8rem; color:rgba(220,255,240,0.7); margin-top:4px; }
    .pb-right { font-family:'Share Tech Mono',monospace; font-size:0.9rem; color:rgba(220,255,240,0.6); }
    .live-dot {
      display:inline-block; width:6px; height:6px;
      border-radius:50%; background:var(--green);
      margin-right:6px; animation:pulse 1.5s infinite;
    }

    /* METRICS */
    .metrics-row {
      display:grid; grid-template-columns:repeat(4,1fr);
      gap:12px; margin-bottom:20px;
    }
    @media(max-width:768px) { .metrics-row { grid-template-columns:1fr 1fr; } }

    .metric-card {
      background:var(--panel); border:1px solid var(--border);
      border-radius:12px; padding:20px 24px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    .mc-lbl { font-size:0.7rem; color:var(--green); letter-spacing:2px; text-transform:uppercase; margin-bottom:10px; font-weight:700; }
    .mc-val { font-family:'Share Tech Mono',monospace; font-size:1.6rem; color:#ffffff; }
    .mc-sub { font-size:0.8rem; color:rgba(220,255,240,0.7); margin-top:6px; }

    /* GRID */
    .dash-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:20px; }
    @media(max-width:768px) { .dash-grid { grid-template-columns:1fr; } }

    .card { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:24px 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    .card-title {
      font-size:0.75rem; letter-spacing:4px; text-transform:uppercase;
      color:var(--green); margin-bottom:16px;
      display:flex; align-items:center; gap:8px;
      font-weight: 700;
    }
    .card-title::before { content:''; display:block; width:30px; height:2px; background:var(--green); box-shadow: 0 0 10px var(--green); }
    .chart-wrap { height:220px; position:relative; }

    /* TAUX TABLE */
    .rate-row {
      display:flex; justify-content:space-between; align-items:center;
      padding:9px 12px; margin-bottom:5px;
      border:1px solid var(--border); border-radius:5px;
      background:rgba(0,255,136,0.02);
    }
    .rr-name { font-size:0.8rem; color:#c8f0d8; font-weight:600; }
    .rr-co2  { font-family:'Share Tech Mono',monospace; font-size:0.85rem; color:#4a8a6a; }
    .rr-tnd  { font-family:'Share Tech Mono',monospace; font-size:0.9rem; color:var(--green); }
    .rr-bar  { height:2px; background:rgba(255,255,255,0.05); border-radius:1px; margin-top:5px; }
    .rr-fill { height:100%; border-radius:1px; background:linear-gradient(90deg,#00ff8820,var(--green)); }

    /* PROJECTION */
    .proj-row {
      display:flex; justify-content:space-between;
      padding:8px 0; border-bottom:1px solid rgba(0,255,136,0.08);
    }
    .proj-year { font-family:'Share Tech Mono',monospace; font-size:0.8rem; color:#4a8a6a; }
    .proj-tnd  { font-family:'Share Tech Mono',monospace; font-size:0.85rem; color:var(--green); }

    .hint-msg {
      text-align:center; padding:30px;
      font-size:0.75rem; color:#3a6a4a;
      font-family:'Share Tech Mono',monospace; line-height:2;
    }
  </style>
</head>
<body>

<header id="header">
  <a href="/" class="logo-wrap">
    <svg class="logo-svg" viewBox="0 0 300 280" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#ccff44"/><stop offset="100%" stop-color="#006622"/>
        </linearGradient>
      </defs>
      <path d="M150,155 Q100,120 30,90 Q70,125 115,148 Z"  fill="url(#lg1)" opacity=".95"/>
      <path d="M150,155 Q200,120 270,90 Q230,125 185,148 Z" fill="url(#lg1)" opacity=".95"/>
      <path d="M150,155 Q95,135 25,128 Q68,155 118,158 Z"  fill="#44cc22" opacity=".85"/>
      <path d="M150,155 Q205,135 275,128 Q232,155 182,158 Z" fill="#44cc22" opacity=".85"/>
      <path d="M148,195 Q138,235 125,272 Q142,248 152,205 Z" fill="#33aa11"/>
      <path d="M152,195 Q162,235 175,272 Q158,248 148,205 Z" fill="#33aa11"/>
      <ellipse cx="150" cy="148" rx="18" ry="30" fill="#66dd22"/>
      <ellipse cx="150" cy="82"  rx="16" ry="16" fill="#77ee33"/>
      <path d="M150,66 Q147,50 150,38 Q153,50 150,66Z" fill="#ffcc44"/>
      <path d="M143,68 Q137,53 139,41 Q144,56 145,69Z" fill="#ffcc44" opacity=".75"/>
      <path d="M157,68 Q163,53 161,41 Q156,56 155,69Z" fill="#ffcc44" opacity=".75"/>
    </svg>
    <div>
      <span class="logo-text">OASIS PHOENIX</span>
      <span class="logo-sub-text">AI HEALING GABÈS</span>
    </div>
  </a>

  <div style="margin-left: auto; margin-right: 20px; display: flex; align-items: center; gap: 15px;">
     <div style="font-size:11px; color:var(--green); background:rgba(29,158,117,.12);
      border:1px solid rgba(29,158,117,.3); padding:3px 10px; border-radius:20px;
      display:flex; align-items:center; gap:5px; font-family:'Share Tech Mono';">
      <div class="pulse-dot" style="width:6px; height:6px; margin:0"></div>Rafraîchissement 30s
    </div>
  </div>

  <nav class="nav-links">
    <a href="/" class="nav-btn">Accueil</a>
    <a href="/dashboard" class="nav-btn">Surveillance</a>
    <a href="/reclamation/dashboard" class="nav-btn">Signaler</a>
    <a href="/culture" class="nav-btn">Culture</a>
    <a href="/culture/carbone" class="nav-btn active"><span class="pulse-dot" style="width:5px;height:5px;margin-right:5px"></span>Carbone</a>
  </nav>
</header>


<div id="content">
  <div id="loading" class="hint-msg">Chargement données Carbonmark...</div>
  <div id="dashboard" style="display:none"></div>
</div>

<script>
async function init() {
  try {
    // Charger prix + taux depuis l'API
    const [priceRes, ratesRes] = await Promise.all([
      fetch('/culture/carbon/price'),
      fetch('/culture/carbon/rates')
    ]);
    const price = await priceRes.json();
    const rates = await ratesRes.json();

    // Données dernière parcelle analysée
    const lastData = JSON.parse(localStorage.getItem('culture_last') || 'null');

    document.getElementById('loading').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';

    renderDashboard(price, rates, lastData);
  } catch(e) {
    document.getElementById('loading').innerHTML =
      '<div style="color:#ff3355">Erreur chargement API: ' + e.message + '</div>';
  }
}

function renderDashboard(price, rates, lastData) {
  const dash = document.getElementById('dashboard');

  // Données parcelle active
  const hasParcel = lastData && lastData.recommandations;
  const top        = hasParcel ? lastData.recommandations[0] : null;
  const sup        = hasParcel ? lastData.superficie_ha : 1;

  dash.innerHTML = `

    <!-- PRIX BANNER -->
    <div class="price-banner">
      <div class="pb-left">
        <div>
          <div class="pb-title">Prix marché crédits carbone</div>
          <div class="pb-price">${price.prix_usd_tonne} USD<span style="font-size:1rem;color:#4a8a6a">/t</span></div>
          <div class="pb-sub">${price.prix_tnd_tonne} TND/tonne CO₂</div>
        </div>
        <div>
          <div class="pb-title">Source</div>
          <div style="font-family:'Share Tech Mono',monospace;font-size:0.8rem;color:var(--green);margin-top:6px">
            ${price.source}
          </div>
        </div>
      </div>
      <div class="pb-right">
        <span class="live-dot"></span>Données temps réel
      </div>
    </div>

    <!-- METRICS -->
    <div class="metrics-row">
      <div class="metric-card">
        <div class="mc-lbl">Plante recommandée</div>
        <div class="mc-val" style="font-size:0.9rem">${hasParcel ? top.name : '—'}</div>
        <div class="mc-sub">${hasParcel ? top.scientname : 'Analysez une parcelle'}</div>
      </div>
      <div class="metric-card">
        <div class="mc-lbl">CO₂ séquestré/an</div>
        <div class="mc-val">${hasParcel ? top.carbon.tCO2_total_an : '—'}<span style="font-size:0.8rem"> t</span></div>
        <div class="mc-sub">${hasParcel ? top.carbon.tCO2_ha_an + ' t/ha/an' : ''}</div>
      </div>
      <div class="metric-card">
        <div class="mc-lbl">Revenu annuel</div>
        <div class="mc-val">${hasParcel ? top.carbon.revenu_tnd_an : '—'}<span style="font-size:0.8rem"> TND</span></div>
        <div class="mc-sub">${hasParcel ? top.carbon.revenu_usd_an + ' USD' : ''}</div>
      </div>
      <div class="metric-card">
        <div class="mc-lbl">Revenu 5 ans</div>
        <div class="mc-val">${hasParcel ? top.carbon.revenu_tnd_5ans : '—'}<span style="font-size:0.8rem"> TND</span></div>
        <div class="mc-sub">${hasParcel ? sup + ' ha · Gold Standard' : ''}</div>
      </div>
    </div>

    <div class="dash-grid">

      <!-- TAUX PAR GENRE -->
      <div class="card">
        <div class="card-title">Taux de séquestration par genre</div>
        ${rates.taux.map(r => `
          <div class="rate-row">
            <div>
              <div class="rr-name">${r.genre}</div>
              <div class="rr-bar">
                <div class="rr-fill" style="width:${(r.tCO2_ha_an/12)*100}%"></div>
              </div>
            </div>
            <div style="text-align:right">
              <div class="rr-co2">${r.tCO2_ha_an} tCO₂/ha</div>
              <div class="rr-tnd">${r.revenu_tnd_an} TND/ha</div>
            </div>
          </div>`).join('')}
      </div>

      <!-- CHART + PROJECTION -->
      <div style="display:flex;flex-direction:column;gap:16px">

        <div class="card">
          <div class="card-title">Revenus par genre (TND/ha/an)</div>
          <div class="chart-wrap">
            <canvas id="rates-chart"></canvas>
          </div>
        </div>

        ${hasParcel ? `
        <div class="card">
          <div class="card-title">Projection revenus — ${top.name}</div>
          ${[1,2,3,4,5].map(y => `
            <div class="proj-row">
              <span class="proj-year">Année ${y}</span>
              <span class="proj-tnd">${(top.carbon.revenu_tnd_an * y).toFixed(0)} TND</span>
            </div>`).join('')}
          <div class="proj-row" style="border:none;margin-top:6px">
            <span style="font-size:0.7rem;color:#3a6a4a;letter-spacing:1px">TOTAL 5 ANS</span>
            <span class="proj-tnd" style="color:var(--yellow)">${top.carbon.revenu_tnd_5ans} TND</span>
          </div>
        </div>` : `
        <div class="card">
          <div class="hint-msg">Analysez une parcelle<br>pour voir la projection</div>
        </div>`}

      </div>
    </div>`;

  // Chart taux
  const ctx = document.getElementById('rates-chart').getContext('2d');
  new Chart(ctx, {
    type:'bar',
    data:{
      labels: rates.taux.map(r => r.genre),
      datasets:[{
        data:            rates.taux.map(r => r.revenu_tnd_an),
        backgroundColor: rates.taux.map(r =>
          hasParcel && top.scientname.toUpperCase().startsWith(r.genre)
            ? 'rgba(0,255,136,0.7)' : 'rgba(0,255,136,0.15)'),
        borderColor:     rates.taux.map(r =>
          hasParcel && top.scientname.toUpperCase().startsWith(r.genre)
            ? '#00ff88' : 'rgba(0,255,136,0.3)'),
        borderWidth:1, borderRadius:4,
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ display:false } },
      scales:{
        x:{ ticks:{ color:'#4a8a6a', font:{size:9} }, grid:{ color:'rgba(0,255,136,0.05)' } },
        y:{ ticks:{ color:'#4a8a6a' }, grid:{ color:'rgba(0,255,136,0.05)' } }
      }
    }
  });
}

init();
// Rafraîchir prix toutes les 5 min
setInterval(init, 300000);
</script>
</body>
</html>
