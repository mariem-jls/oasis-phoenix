<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Culture Phoenix — Résultats</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;600;800&family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --green:#00ff88; --yellow:#ffcc00; --red:#ff3355;
      --blue:#00cfff;  --bg:#121c26;    --panel:#1d2a38;
      --border:rgba(0,255,136,0.3);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:var(--bg); color:#ffffff;
      font-family:'Exo 2',sans-serif;
      min-height:100vh; display:flex; flex-direction:column;
    }

    /* HEADER */
    #header {
      position: sticky; top:0; z-index:100;
      display: flex; align-items:center; justify-content:space-between;
      padding: 10px 28px;
      background: rgba(5,13,18,0.97);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(8px);
    }
    .logo-wrap { display:flex; align-items:center; gap:14px; text-decoration:none; }
    .logo-svg { width:38px; height:38px; }
    .logo-text { font-family:'Cinzel',serif; font-size:.9rem; font-weight:700; letter-spacing:.2em; color:var(--green); text-shadow:0 0 20px rgba(0,255,136,0.5); }
    .logo-sub-text { font-family:'Share Tech Mono',monospace; font-size:.5rem; letter-spacing:.3em; color:rgba(0,255,136,0.4); display:block; margin-top:2px; }

    .pulse-dot { width:8px; height:8px; border-radius:50%; background:var(--green); display:inline-block; margin-right:8px; animation:pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(0,255,136,0.7)} 50%{box-shadow:0 0 0 6px rgba(0,255,136,0)} }

    .nav-links { display:flex; gap:8px; align-items: center; }
    .nav-btn {
      font-family:'Share Tech Mono',monospace; font-size:.62rem; letter-spacing:.15em;
      padding:7px 16px; border-radius:999px; cursor:pointer; text-decoration:none;
      border:1px solid var(--border); background:rgba(0,255,136,0.06); color:#d2ffe6;
      transition:all .25s;
    }
    .nav-btn:hover { background:rgba(0,255,136,0.15); border-color:rgba(0,255,136,0.4); }
    .nav-btn.active { border-color: var(--green); background: rgba(0,255,136,0.1); }


    #content { padding:24px; max-width:1200px; margin:0 auto; width:100%; }

    /* BANNER */
    .result-banner {
      border:1px solid rgba(0,255,136,0.3);
      background:rgba(0,255,136,0.05);
      border-radius:8px; padding:16px 20px;
      margin-bottom:20px;
      display:flex; justify-content:space-between; align-items:center;
      flex-wrap:wrap; gap:12px;
    }
    .banner-coord {
      font-family:'Share Tech Mono',monospace; font-size:0.9rem;
      color:var(--green);
    }
    .banner-sub { font-size:0.7rem; color:#4a8a6a; margin-top:4px; }
    .banner-stats { display:flex; gap:24px; }
    .bstat-val { font-family:'Share Tech Mono',monospace; font-size:1.4rem; color:var(--green); }
    .bstat-lbl { font-size:0.6rem; letter-spacing:2px; color:#3a6a4a; text-transform:uppercase; }

    /* GRID */
    .results-grid {
      display:grid; grid-template-columns:1fr 1fr;
      gap:16px; margin-bottom:20px;
    }
    @media(max-width:768px) { .results-grid { grid-template-columns:1fr; } }

    /* CARDS */
    .card {
      background:var(--panel); border:1px solid var(--border);
      border-radius:12px; padding:24px 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    .card-title {
      font-size:0.75rem; letter-spacing:4px; text-transform:uppercase;
      color:var(--green); margin-bottom:16px;
      display:flex; align-items:center; gap:8px;
      font-weight: 700;
    }
    .card-title::before { content:''; display:block; width:30px; height:2px; background:var(--green); box-shadow: 0 0 10px var(--green); }

    /* PLANTE PRINCIPALE */
    .main-plant {
      position:relative; overflow:hidden;
      border: 1px solid var(--green);
      background: linear-gradient(135deg, rgba(0,255,136,0.1) 0%, rgba(22,36,49,0.6) 100%);
      border-radius:12px; padding:28px 24px;
      margin-bottom:24px;
      box-shadow: 0 0 25px rgba(0,255,136,0.15), inset 0 0 20px rgba(0,255,136,0.05);
    }
    .main-plant::before {
      content:''; position:absolute; top:0; left:0; right:0; height:3px;
      background: linear-gradient(90deg, var(--green), #00ffaa, var(--green));
      box-shadow: 0 0 10px var(--green);
    }
    .mp-rank  { font-size:0.75rem; color:var(--green); letter-spacing:3px; margin-bottom:12px; font-weight:800; display:flex; align-items:center; gap:8px; text-shadow: 0 0 10px rgba(0,255,136,0.5); }
    .mp-name  { font-size:1.8rem; font-weight:900; color:#ffffff; margin-bottom:6px; letter-spacing:1px; }
    .mp-sci   { font-size:0.95rem; color:rgba(220,255,240,0.8); font-style:italic; margin-bottom:18px; }
    .mp-stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-top:20px; padding-top:16px; border-top:1px solid rgba(0,255,136,0.2); }
    .mp-stat  { text-align:center; }
    .mp-stat-val { font-family:'Share Tech Mono',monospace; font-size:1.5rem; color:var(--green); text-shadow: 0 0 10px rgba(0,255,136,0.3); }
    .mp-stat-lbl { font-size:0.75rem; color:rgba(220,255,240,0.7); text-transform:uppercase; letter-spacing:1px; margin-top:5px; }

    /* AUTRES PLANTES */
    .alt-plant {
      display:flex; justify-content:space-between; align-items:center;
      padding:16px 18px; margin-bottom:12px;
      border:1px solid rgba(0,255,136,0.15); border-radius:8px;
      background:rgba(0,255,136,0.03);
      transition:all 0.3s ease;
      cursor:pointer;
    }
    .alt-plant:hover {
      background:rgba(0,255,136,0.08); border-color:var(--green); transform:translateY(-2px);
      box-shadow: 0 4px 15px rgba(0,255,136,0.1);
    }
    .ap-left { display:flex; gap:14px; align-items:center; }
    .ap-rank-num { font-family:'Share Tech Mono',monospace; font-size:1.2rem; color:rgba(0,255,136,0.4); font-weight:700; }
    .alt-plant:hover .ap-rank-num { color:var(--green); text-shadow: 0 0 10px rgba(0,255,136,0.5); }
    .ap-left .ap-name { font-size:1rem; color:#ffffff; font-weight:700; margin-bottom:2px; }
    .ap-left .ap-sci  { font-size:0.8rem; color:rgba(220,255,240,0.6); font-style:italic; }
    .ap-right { text-align:right; }
    .ap-conf  { font-family:'Share Tech Mono',monospace; font-size:1.1rem; color:var(--green); }
    .ap-rev   { font-size:0.8rem; color:rgba(220,255,240,0.6); margin-top:4px; }
    .conf-bar { height:3px; background:rgba(255,255,255,0.05); border-radius:2px; margin-top:8px; }
    .conf-fill{ height:100%; border-radius:2px; background:var(--green); transition:width 0.8s; box-shadow: 0 0 5px var(--green); }

    /* TERRAIN */
    .terrain-grid {
      display:grid; grid-template-columns:1fr 1fr; gap:8px;
    }
    .t-item { padding:8px 10px; background:rgba(0,255,136,0.03); border-radius:4px; border:1px solid var(--border); }
    .t-lbl  { font-size:0.6rem; color:#3a6a4a; letter-spacing:1px; text-transform:uppercase; }
    .t-val  { font-family:'Share Tech Mono',monospace; font-size:0.9rem; color:var(--green); margin-top:3px; }

    /* CHART */
    .chart-wrap { height:200px; position:relative; }

    .hint-msg {
      text-align:center; padding:40px 10px;
      font-size:0.8rem; color:#3a6a4a;
      font-family:'Share Tech Mono',monospace; line-height:2;
    }
  </style>
</head>
<body>

<header id="header">
  <a href="/" class="logo-wrap">
    <svg class="logo-svg" viewBox="0 0 300 280" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#ccff44"/><stop offset="100%" stop-color="#006622"/>
        </linearGradient>
      </defs>
      <path d="M150,155 Q100,120 30,90 Q70,125 115,148 Z"  fill="url(#lg1)" opacity=".95"/>
      <path d="M150,155 Q200,120 270,90 Q230,125 185,148 Z" fill="url(#lg1)" opacity=".95"/>
      <path d="M150,155 Q95,135 25,128 Q68,155 118,158 Z"  fill="#44cc22" opacity=".85"/>
      <path d="M150,155 Q205,135 275,128 Q232,155 182,158 Z" fill="#44cc22" opacity=".85"/>
      <path d="M148,195 Q138,235 125,272 Q142,248 152,205 Z" fill="#33aa11"/>
      <path d="M152,195 Q162,235 175,272 Q158,248 148,205 Z" fill="#33aa11"/>
      <ellipse cx="150" cy="148" rx="18" ry="30" fill="#66dd22"/>
      <ellipse cx="150" cy="82"  rx="16" ry="16" fill="#77ee33"/>
      <path d="M150,66 Q147,50 150,38 Q153,50 150,66Z" fill="#ffcc44"/>
      <path d="M143,68 Q137,53 139,41 Q144,56 145,69Z" fill="#ffcc44" opacity=".75"/>
      <path d="M157,68 Q163,53 161,41 Q156,56 155,69Z" fill="#ffcc44" opacity=".75"/>
    </svg>
    <div>
      <span class="logo-text">OASIS PHOENIX</span>
      <span class="logo-sub-text">AI HEALING GABÈS</span>
    </div>
  </a>

  <div style="margin-left: auto; margin-right: 20px; display: flex; align-items: center; gap: 15px;">
     <div style="font-size:11px; color:var(--green); background:rgba(29,158,117,.12);
      border:1px solid rgba(29,158,117,.3); padding:3px 10px; border-radius:20px;
      display:flex; align-items:center; gap:5px; font-family:'Share Tech Mono';">
      <div class="pulse-dot" style="width:6px; height:6px; margin:0"></div>Rafraîchissement 30s
    </div>
  </div>

  <nav class="nav-links">
    <a href="/" class="nav-btn">Accueil</a>
    <a href="/dashboard" class="nav-btn">Surveillance</a>
    <a href="/reclamation/dashboard" class="nav-btn">Signaler</a>
    <a href="/culture" class="nav-btn active"><span class="pulse-dot" style="width:5px;height:5px;margin-right:5px"></span>Culture</a>
    <a href="/culture/carbone" class="nav-btn">Carbone</a>
  </nav>
</header>


<div id="content">
  <div id="main-content">
    <div class="hint-msg">
      Aucun résultat disponible<br>
      Retournez sur la carte et cliquez sur une parcelle
    </div>
  </div>
</div>

<script>
const raw = localStorage.getItem('culture_last');

if (!raw) {
  document.getElementById('main-content').innerHTML = `
    <div class="hint-msg">
      Aucun résultat disponible<br>
      <a href="/static/culture/carte_culture.html"
         style="color:var(--green);font-family:'Share Tech Mono',monospace">
        → Retour carte
      </a>
    </div>`;
} else {
  const data = JSON.parse(raw);
  const t    = data.conditions_terrain;
  const recs = data.recommandations;
  const top  = recs[0];
  const coord = data.coordonnees;

  document.getElementById('main-content').innerHTML = `

    <!-- BANNER -->
    <div class="result-banner">
      <div>
        <div class="banner-coord">
          ${coord.lat}°N  ${coord.lon}°E
        </div>
        <div class="banner-sub">
          Superficie: ${data.superficie_ha} ha &nbsp;|&nbsp;
          Analyses: SoilGrids · Open-Meteo · NASA POWER · FAO ECOCROP
        </div>
      </div>
      <div class="banner-stats">
        <div>
          <div class="bstat-val">${recs.length}</div>
          <div class="bstat-lbl">Plantes</div>
        </div>
        <div>
          <div class="bstat-val">${top.carbon.tCO2_ha_an}t</div>
          <div class="bstat-lbl">CO₂/ha/an</div>
        </div>
        <div>
          <div class="bstat-val">${top.carbon.revenu_tnd_an}</div>
          <div class="bstat-lbl">TND/an</div>
        </div>
      </div>
    </div>

    <div class="results-grid">

      <!-- COL 1 : Recommandations -->
      <div>
        <div class="card">
          <div class="card-title">Top 5 Recommandations Agronomiques</div>
          <div class="main-plant">
            <div class="mp-rank">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/>
              </svg>
              MEILLEURE CORRESPONDANCE FAO
            </div>
            ${top.image_url ? `<img src="${top.image_url}" alt="${top.nom_commun_fr}"
              style="width:100%;height:160px;object-fit:cover;border-radius:8px;
                     margin-bottom:14px;opacity:0.95; border:1px solid rgba(0,255,136,0.3);">` : ''}
            <div class="mp-name">${top.nom_commun_fr || top.name}</div>
            ${top.nom_commun_ar ? `<div style="font-size:1.1rem;color:rgba(0,255,136,0.8);
              direction:rtl;margin-bottom:4px;font-weight:700;">${top.nom_commun_ar}</div>` : ''}
            ${top.nom_tunisie ? `<div style="font-size:0.8rem;color:rgba(220,255,240,0.6);
              margin-bottom:6px">Appellation locale: <span style="color:#fff">${top.nom_tunisie}</span></div>` : ''}
            <div class="mp-sci">${top.scientname}</div>
            ${top.description_fr ? `<div style="font-size:0.8rem;color:rgba(220,255,240,0.8);
              line-height:1.6;margin-bottom:14px">${top.description_fr}</div>` : ''}
            ${top.pourquoi_ici ? `
              <div style="background:rgba(0,255,136,0.05);border-left:2px solid var(--green);
                padding:8px 10px;border-radius:0 4px 4px 0;margin-bottom:10px">
                <div style="font-size:0.58rem;color:#2a5a3a;letter-spacing:2px;
                  text-transform:uppercase;margin-bottom:3px">Pourquoi ici</div>
                <div style="font-size:0.72rem;color:#7ab89a;line-height:1.5">
                  ${top.pourquoi_ici}</div>
              </div>` : ''}
            ${top.conseils_plantation ? `
              <div style="font-size:0.68rem;color:#4a7a5a;margin-bottom:10px">
                <span style="color:#2a5a3a">Conseil : </span>${top.conseils_plantation}
                ${top.saison_plantation ? ` — <span style="color:var(--yellow)">
                  ${top.saison_plantation}</span>` : ''}
              </div>` : ''}
            <div class="mp-stats">
              <div class="mp-stat">
                <div class="mp-stat-val">${top.confiance_pct}%</div>
                <div class="mp-stat-lbl">Confiance</div>
              </div>
              <div class="mp-stat">
                <div class="mp-stat-val">${top.carbon.tCO2_ha_an}t</div>
                <div class="mp-stat-lbl">CO₂/ha/an</div>
              </div>
              <div class="mp-stat">
                <div class="mp-stat-val">${top.carbon.revenu_tnd_5ans}</div>
                <div class="mp-stat-lbl">TND/5 ans</div>
              </div>
            </div>
          </div>

          <div class="card-title" style="margin-top:20px">Alternatives Haut-Potentiel</div>
          ${recs.slice(1).map((r,i) => `
            <div class="alt-plant">
              <div class="ap-left">
                <div class="ap-rank-num">#${i+2}</div>
                ${r.image_url ? `<img src="${r.image_url}" alt=""
                  style="width:50px;height:50px;border-radius:6px;
                  object-fit:cover;opacity:0.9;flex-shrink:0;border:1px solid rgba(0,255,136,0.2);">` : ''}
                <div>
                  <div class="ap-name">${r.nom_commun_fr || r.name}</div>
                  ${r.nom_commun_ar ? `<div style="font-size:0.75rem;
                    color:rgba(0,255,136,0.6);direction:rtl;font-weight:600;">${r.nom_commun_ar}</div>` : ''}
                  <div class="ap-sci">${r.scientname}</div>
                  <div class="conf-bar">
                    <div class="conf-fill" style="width:${r.confiance_pct}%"></div>
                  </div>
                </div>
              </div>
              <div class="ap-right">
                <div class="ap-conf">${r.confiance_pct}%</div>
                <div class="ap-rev">${r.carbon.revenu_tnd_an} TND/an</div>
              </div>
            </div>`).join('')}
        </div>
      </div>

      <!-- COL 2 : Terrain + Chart -->
      <div style="display:flex;flex-direction:column;gap:16px">

        <div class="card">
          <div class="card-title">Conditions terrain</div>
          <div class="terrain-grid">
            <div class="t-item"><div class="t-lbl">pH sol</div><div class="t-val">${t.pH}</div></div>
            <div class="t-item"><div class="t-lbl">Salinité</div><div class="t-val">${t.salinite} dS/m</div></div>
            <div class="t-item"><div class="t-lbl">T max</div><div class="t-val">${t.T_max}°C</div></div>
            <div class="t-item"><div class="t-lbl">T min</div><div class="t-val">${t.T_min}°C</div></div>
            <div class="t-item"><div class="t-lbl">Précip.</div><div class="t-val">${t.precip_mm} mm</div></div>
            <div class="t-item"><div class="t-lbl">NDVI</div><div class="t-val">${t.ndvi}</div></div>
            <div class="t-item"><div class="t-lbl">Radiation</div><div class="t-val">${t.radiation} kWh</div></div>
            <div class="t-item"><div class="t-lbl">Humidité sol</div><div class="t-val">${(t.moisture*100).toFixed(1)}%</div></div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">Confiance par plante</div>
          <div class="chart-wrap">
            <canvas id="conf-chart"></canvas>
          </div>
        </div>

      </div>
    </div>`;

  // Chart confiance
  const ctx = document.getElementById('conf-chart').getContext('2d');
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: recs.map(r => r.name.split(' ').slice(0,2).join(' ')),
      datasets:[{
        data:            recs.map(r => r.confiance_pct),
        backgroundColor: recs.map((_,i) => i===0 ? 'rgba(0,255,136,0.6)' : 'rgba(0,255,136,0.15)'),
        borderColor:     recs.map((_,i) => i===0 ? '#00ff88' : 'rgba(0,255,136,0.3)'),
        borderWidth: 1,
        borderRadius: 4,
      }]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ display:false } },
      scales:{
        x:{ ticks:{ color:'#4a8a6a', font:{size:9} }, grid:{ color:'rgba(0,255,136,0.05)' } },
        y:{ ticks:{ color:'#4a8a6a' }, grid:{ color:'rgba(0,255,136,0.05)' },
            min:0, max:100 }
      }
    }
  });
}
</script>
</body>
</html>
